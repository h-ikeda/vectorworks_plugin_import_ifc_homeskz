name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # requires-python (>=3.9) の下限と新しめのバージョンで検証する
        # (Python 3.9 では ifcopenshell は 3.9 対応の最終版 0.8.4.post1 が解決される)
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e ".[test]"

      - name: Verify dependencies
        run: |
          python -c "import ifcopenshell; print(f'ifcopenshell {ifcopenshell.__version__} installed')"
          python -c "import pytest; print(f'pytest {pytest.__version__} installed')"

      - name: Download VectorWorks official vs.py stub
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Vectorworks/developer-scripting/main/Python/pages/files/vs.py \
            -o tests/vs.py
          if [ ! -f tests/vs.py ]; then
            echo "Failed to download vs.py"
            exit 1
          fi
          echo "vs.py downloaded successfully"

      - name: Run type check (mypy)
        run: mypy

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src/vectorworks_plugin_import_ifc_homeskz --cov-report=xml

      - name: Upload coverage to Codecov
        # カバレッジは matrix のうち 1 バージョン分のみアップロードする
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
